vision: >
  Humans ran on voice for a hundred thousand years; screens got the last
  fifty. I want to make the interfaces that shouldn't exist disappear —
  you say what you need, the machine does it, and it feels like talking
  to a competent colleague. I'm starting where it's hardest and matters
  most: real-time, real phone lines, real patients.
